name: Paper Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Paper
        run: ./gradlew :paper:clean :paper:build --no-daemon

      - name: Upload Paper artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-artifacts
          path: |
            paper/build/libs/*
            !paper/build/libs/*-sources.jar
          if-no-files-found: error