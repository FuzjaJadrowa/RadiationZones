name: Multiloader Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Fabric-NeoForge bundle
        run: ./gradlew clean :multiloaderJar --no-daemon

      - name: Upload Fabric-NeoForge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fabric-neoforge-artifacts
          path: |
            build/libs/*fabric-neoforge*.jar
          if-no-files-found: error
